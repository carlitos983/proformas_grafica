<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Proforma – Gráfica Silvestre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* Estructura base alineada a tu versión original */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; font-family: -apple-system, 'Segoe UI', Arial, sans-serif; padding: 0 0 60px; -webkit-text-size-adjust: 100%; color: #333; }
.topbar { background: #1a3a5c; color: white; text-align: center; padding: 16px 20px 12px; }
.topbar h1 { font-size: 1.25rem; font-weight: 700; }
.topbar p { font-size: 0.78rem; opacity: 0.65; margin-top: 3px; }
.section { background: white; margin: 14px 12px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 15px; }
.section-title { background: #1a3a5c; color: white; padding: 10px 15px; margin: -15px -15px 15px -15px; font-weight: bold; font-size: 0.9rem; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: #555; }
.form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; outline: none; }
.form-control:focus { border-color: #1a3a5c; }

/* Items - Ajustado para que el botón y la imagen no rompan el layout */
.item-row { border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
.item-inputs { display: grid; grid-template-columns: 60px 1fr 80px 80px 40px; gap: 8px; margin-bottom: 10px; align-items: start; }
@media(max-width: 600px) {
  .item-inputs { grid-template-columns: 1fr 1fr; }
  .item-inputs .desc { grid-column: 1 / -1; }
  .item-inputs .btn-delete { grid-column: 1 / -1; }
}
.btn-delete { background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; height: 38px; font-weight: bold; }
.btn-add { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
.btn-generate { background: #1a3a5c; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 20px; box-shadow: 0 4px 12px rgba(26, 58, 92, 0.3); }

/* Controles de subida y Notas */
.item-image-upload { display: flex; align-items: center; gap: 10px; }
.btn-upload { background: #e2e6ea; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid #ccc; display: inline-block; font-weight: bold; }
.checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; }
.red-text-option { color: #dc3545; font-weight: bold; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Gráfica Silvestre</h1>
  <p>Generador de Proformas</p>
</div>

<div class="section">
  <div class="section-title">Datos del Cliente</div>
  <div class="form-group">
    <label>Cliente / Razón Social</label>
    <input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente">
  </div>
  <div class="form-group">
    <label>RUC / DNI</label>
    <input type="text" id="ruc" class="form-control" placeholder="10... / 20...">
  </div>
  <div class="form-group">
    <label>Número de Proforma</label>
    <input type="text" id="numero" class="form-control" placeholder="0001">
  </div>
</div>

<div class="section">
  <div class="section-title">Detalle de Productos</div>
  <div id="items-container">
    <div class="item-row">
      <div class="item-inputs">
        <input type="number" class="form-control cant" placeholder="Cant." oninput="calcTotal(this)" value="1">
        <textarea class="form-control desc" placeholder="Descripción del producto..." rows="2"></textarea>
        <input type="number" class="form-control precio" placeholder="P. Unit" oninput="calcTotal(this)">
        <input type="text" class="form-control pt" placeholder="Total" readonly>
        <button type="button" class="btn-delete" onclick="eliminarFila(this)">X</button>
      </div>
      <div class="item-image-upload">
        <label class="btn-upload">
          📷 Subir Imagen (Opcional)
          <input type="file" accept="image/*" class="item-img" onchange="cargarImagen(this)" style="display:none">
        </label>
        <img class="img-preview" style="display:none; max-width:50px; max-height:50px; border-radius:4px; border:1px solid #ddd;">
      </div>
    </div>
  </div>
  <button type="button" class="btn-add" onclick="agregarItem()">+ Añadir otro producto</button>
  <div style="text-align:right; font-weight:bold; font-size:1.2rem; margin-top:15px; padding-right:10px;">
    TOTAL: S/ <span id="totalGlobal">0.00</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Notas Extras (Aparecerán al final)</div>
  <label class="checkbox-group">
    <input type="checkbox" id="entregaCheck" checked> Tiempo de entrega: 15 días hábiles.
  </label>
  <label class="checkbox-group">
    <input type="checkbox" id="igvCheck" checked> Nuestros precios ya incluyen IGV.
  </label>
  <div class="form-group" style="margin-top:10px;">
    <label>Nota personalizada extra</label>
    <input type="text" id="nota" class="form-control" placeholder="Ej. Pago del 50% por adelantado...">
  </div>
  <label class="checkbox-group red-text-option">
    <input type="checkbox" id="notaRoja"> Resaltar nota personalizada en ROJO (Importante)
  </label>
</div>

<div style="padding: 0 12px;">
  <button type="button" class="btn-generate" onclick="generarPDF()">Generar PDF</button>
</div>

<script>
// ==========================================
// 1. LÓGICA DE INTERFAZ Y CÁLCULOS
// ==========================================

function calcTotal(elem) {
  let row = elem.closest('.item-row');
  let cant = parseFloat(row.querySelector('.cant').value) || 0;
  let precio = parseFloat(row.querySelector('.precio').value) || 0;
  
  // AQUÍ ESTÁ EL FIX DEL BUG 00000: Obligamos a que el corte sea de 2 decimales exactos.
  let total = (cant * precio).toFixed(2);
  row.querySelector('.pt').value = total;
  
  calcGlobal();
}

function calcGlobal() {
  let subt = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    subt += parseFloat(row.querySelector('.pt').value) || 0;
  });
  document.getElementById('totalGlobal').innerText = subt.toFixed(2);
}

function agregarItem() {
  const container = document.getElementById('items-container');
  const clone = container.firstElementChild.cloneNode(true);
  
  // Limpiar valores del clon para no arrastrar datos previos
  clone.querySelector('.desc').value = '';
  clone.querySelector('.precio').value = '';
  clone.querySelector('.pt').value = '';
  clone.querySelector('.cant').value = '1';
  clone.querySelector('.img-preview').style.display = 'none';
  clone.querySelector('.img-preview').src = '';
  clone.removeAttribute('data-img-base64');
  
  container.appendChild(clone);
}

function eliminarFila(btn) {
  const rows = document.querySelectorAll('.item-row');
  if (rows.length > 1) {
    btn.closest('.item-row').remove();
    calcGlobal();
  } else {
    alert("Debe quedar al menos un producto.");
  }
}

function cargarImagen(input) {
  if (input.files && input.files[0]) {
    let reader = new FileReader();
    reader.onload = function(e) {
      // Guardamos la imagen en base64 en los datos del HTML de la fila
      input.closest('.item-row').dataset.imgBase64 = e.target.result;
      let preview = input.closest('.item-row').querySelector('.img-preview');
      preview.src = e.target.result;
      preview.style.display = 'inline-block';
    }
    reader.readAsDataURL(input.files[0]); // Convierte a DataURL
  }
}

// ==========================================
// 2. GENERACIÓN DEL PDF (JSPDF)
// ==========================================

function generarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  
  // ==============================================================
  // ⚠️⚠️ ¡OJO! PEGA AQUÍ TUS VARIABLES DE IMÁGENES DE TU CÓDIGO VIEJO ⚠️⚠️
  // Ejemplo: var IMG_FOOTER_BANCOS = "data:image/png;base64,iVBORw0K...";
  // ==============================================================
  var IMG_FOOTER_BANCOS = null; // <- REEMPLAZA ESTO
  var IMG_FOOTER_ICONS = null;  // <- REEMPLAZA ESTO
  // ==============================================================

  const W = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const ml = 15, mr = 15, cw = W - ml - mr;
  
  let y = 20;
  const GRAY = [100, 100, 100];
  const LGRAY = [220, 220, 220];

  function sf(style, size, color) {
    doc.setFont("helvetica", style || "normal");
    if(size) doc.setFontSize(size);
    if(color) doc.setTextColor(color[0], color[1], color[2]);
    else doc.setTextColor(0, 0, 0);
  }

  // --- Cabecera ---
  sf('bold', 16);
  doc.text("PROFORMA N° " + (document.getElementById('numero').value || "0000"), ml, y);
  y += 10;
  
  sf('normal', 10);
  doc.text("Cliente: " + (document.getElementById('cliente').value || "Sin nombre"), ml, y);
  y += 6;
  doc.text("RUC/DNI: " + (document.getElementById('ruc').value || "N/A"), ml, y);
  y += 15;

  // --- Header Tabla ---
  doc.setFillColor(26, 58, 92);
  doc.rect(ml, y, cw, 8, 'F');
  sf('bold', 9, [255,255,255]);
  doc.text("Cant.", ml + 2, y + 5.5);
  doc.text("Descripción", ml + 20, y + 5.5);
  doc.text("P. Unit", ml + cw - 45, y + 5.5);
  doc.text("Total", ml + cw - 20, y + 5.5);
  y += 10;

  // --- Lógica iterativa para dibujar Items con Imágenes ---
  sf('normal', 9, [0,0,0]);
  let items = document.querySelectorAll('.item-row');
  
  items.forEach(row => {
    let cant = row.querySelector('.cant').value || '1';
    let desc = row.querySelector('.desc').value || '';
    let pu = parseFloat(row.querySelector('.precio').value || '0').toFixed(2);
    let pt = row.querySelector('.pt').value || '0.00';
    let imgB64 = row.dataset.imgBase64 || null; // Capturamos la foto si subiste una

    let descX = ml + 20; 
    let maxDescWidth = cw - 70; 
    let wImg = 20; // Tamaño cuadrado que tomará la imagen en mm
    
    // Si hay imagen, acortamos el espacio permitido para el texto
    if (imgB64) {
       maxDescWidth -= (wImg + 3); 
    }

    let textLines = doc.splitTextToSize(desc, maxDescWidth);
    let textHeight = textLines.length * 4.5;
    let imgHeight = imgB64 ? wImg : 0; 
    let rowHeight = Math.max(textHeight, imgHeight) + 6; // Calcula qué es más grande, si la foto o el texto

    if (y + rowHeight > PH - 45) { // Salto de página automático
      doc.addPage();
      y = 20;
    }

    doc.text(cant, ml + 2, y + 4);

    // Dibuja la foto y alinea el texto
    if (imgB64) {
      try {
         doc.addImage(imgB64, 'JPEG', descX, y + 1, wImg, wImg); // Inyecta la imagen
      } catch(e) { console.log("Error cargando imagen al PDF"); }
      doc.text(textLines, descX + wImg + 3, y + 4);
    } else {
      doc.text(textLines, descX, y + 4);
    }

    doc.text("S/ " + pu, ml + cw - 45, y + 4);
    doc.text("S/ " + pt, ml + cw - 20, y + 4);

    y += rowHeight;
    doc.setDrawColor(230,230,230); doc.setLineWidth(0.2);
    doc.line(ml, y - 2, ml + cw, y - 2); // Línea separadora
  });

  // --- Total Global ---
  y += 5;
  sf('bold', 11, [0,0,0]);
  doc.text("TOTAL: S/ " + document.getElementById('totalGlobal').innerText, ml + cw - 50, y);
  y += 15;

  // --- Manejo dinámico de las Notas Extras ---
  var notasArray = [];
  if (document.getElementById('entregaCheck').checked) {
      notasArray.push({ txt: 'Tiempo de entrega: 15 dias habiles.', col: GRAY });
  }
  if (document.getElementById('igvCheck').checked) {
      notasArray.push({ txt: 'Nuestros precios ya incluyen IGV.', col: GRAY });
  }
  
  var extra = document.getElementById('nota').value.trim();
  var esRoja = document.getElementById('notaRoja').checked;
  if (extra) {
      // Si el usuario marcó el check, manda la nota extra en RGB [Rojo, Verde, Azul]
      notasArray.push({ txt: extra, col: esRoja ? [220, 53, 69] : GRAY }); 
  }

  if (notasArray.length > 0) {
    notasArray.forEach(n => {
      sf('italic', 8, n.col);
      var nl = doc.splitTextToSize("• " + n.txt, cw);
      doc.text(nl, ml, y);
      y += (nl.length * 4) + 2; 
    });
  }

  // --- Footer Original (Bancos) ---
  var fy = PH - 33;
  doc.setDrawColor(LGRAY[0],LGRAY[1],LGRAY[2]); doc.setLineWidth(0.3);
  doc.line(ml, fy, ml + cw, fy);
  
  if(IMG_FOOTER_BANCOS) doc.addImage(IMG_FOOTER_BANCOS, 'PNG', ml, fy+2, 78, 28);
  if(IMG_FOOTER_ICONS) doc.addImage(IMG_FOOTER_ICONS,  'PNG', W-mr-75, fy+2, 75, 28);

  // --- Salida del PDF ---
  var clienteStr = document.getElementById('cliente').value.trim() || 'Cliente';
  var numStr = document.getElementById('numero').value.trim() || '0000';
  var fname = 'Proforma_' + numStr + '_' + clienteStr.replace(/[^a-zA-Z0-9]/g,'_').substring(0,20) + '.pdf';
  
  var blob  = doc.output('blob');
  var url   = URL.createObjectURL(blob);
  
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    window.open(url, '_blank');
  } else {
    var a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}
</script>
</body>
</html>
