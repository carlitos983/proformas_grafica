<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Proforma – Gráfica Silvestre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; font-family: -apple-system, 'Segoe UI', Arial, sans-serif; padding: 0 0 60px; color: #333; }
.topbar { background: #1a3a5c; color: white; text-align: center; padding: 16px 20px 12px; }
.topbar h1 { font-size: 1.25rem; font-weight: 700; }
.section { background: white; margin: 14px 12px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 15px; }
.section-title { background: #1a3a5c; color: white; padding: 10px 15px; margin: -15px -15px 15px -15px; font-weight: bold; font-size: 0.9rem; }
.form-group { margin-bottom: 12px; }
.form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
.item-row { border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fafafa; }
.item-inputs { display: grid; grid-template-columns: 70px 1fr 90px 90px 40px; gap: 8px; margin-bottom: 8px; }
.btn-delete { background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; height: 38px; }
.btn-add { background: #28a745; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-generate { background: #1a3a5c; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 20px; }
.btn-upload { background: #e2e6ea; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid #ccc; }
.notes-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.center-ch { text-align: center; width: 50px; }
.red-txt { color: #dc3545; font-weight: bold; }
</style>
</head>
<body>
<div class="topbar"><h1>Gráfica Silvestre S.A.C.</h1></div>
<div class="section">
  <div class="section-title">Información de la Proforma</div>
  <input type="text" id="cliente" class="form-control" placeholder="Cliente">
  <input type="text" id="numero" class="form-control" placeholder="Número Proforma" style="margin-top:10px;">
</div>
<div class="section">
  <div class="section-title">Productos</div>
  <div id="items-container">
    <div class="item-row">
      <div class="item-inputs">
        <input type="number" class="form-control cant" oninput="calcTotal(this)" value="1">
        <textarea class="form-control desc" placeholder="Descripción"></textarea>
        <input type="number" class="form-control precio" oninput="calcTotal(this)">
        <input type="text" class="form-control pt" readonly>
        <button type="button" class="btn-delete" onclick="this.closest('.item-row').remove()">X</button>
      </div>
      <label class="btn-upload">📷 Subir Foto <input type="file" accept="image/*" class="item-img" onchange="cargarImagen(this)" style="display:none"></label>
      <img class="img-preview" style="display:none; max-width:40px; max-height:40px; vertical-align:middle; margin-left:10px;">
    </div>
  </div>
  <button type="button" class="btn-add" onclick="agregarItem()">+ Añadir producto</button>
  <div style="text-align:right; margin-top:10px;">TOTAL: S/ <span id="totalGlobal">0.00</span></div>
</div>
<div class="section">
  <div class="section-title">Condiciones</div>
  <table class="notes-table" id="notes-container">
    <tr><th></th><th>Nota</th><th>Rojo</th></tr>
    <tr><td class="center-ch"><input type="checkbox" class="note-active" checked></td><td><input type="text" class="form-control note-text" value="Nuestros precios ya incluyen IGV."></td><td class="center-ch"><input type="checkbox" class="note-red"></td></tr>
    <tr><td class="center-ch"><input type="checkbox" class="note-active" checked></td><td><input type="text" class="form-control note-text" value="TIEMPO DE ENTREGA: 4 DÍAS HÁBILES"></td><td class="center-ch"><input type="checkbox" class="note-red"></td></tr>
  </table>
</div>
<button type="button" class="btn-generate" onclick="generarPDF()">Generar PDF</button>
